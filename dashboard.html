<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>

body{
font-family: 'Inter', sans-serif;
}

.square{
border-radius:0px;
}

</style>

</head>


<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="bg-white border-b">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-6">

<h1 class="font-semibold text-lg">
GitHub Issues Tracker
</h1>

</div>


<div class="flex gap-2">

<div class="relative">

<input id="searchInput"
class="input input-bordered square pl-9 w-64"
placeholder="Search issues...">

<span class="absolute left-3 top-2 text-gray-400">

</span>

</div>

<button onclick="searchIssues()"
class="btn btn-primary square">
Search
</button>

</div>

</div>

</div>



<!-- MAIN CONTENT -->

<div class="max-w-7xl mx-auto px-6 mt-8 ">

<!-- TABS -->

<div class="flex gap-2 mb-4">

<button id="allTab"
onclick="loadAll()"
class="btn btn-primary square">
All
</button>

<button id="openTab"
onclick="loadOpen()"
class="btn square">
Open
</button>

<button id="closedTab"
onclick="loadClosed()"
class="btn square">
Closed
</button>

</div>



<!-- ISSUES SUMMARY CARD -->

<div class="bg-white p-6 border mb-6">

<div class="flex justify-between items-center">

<div class="flex items-center gap-3">

<div class="bg-purple-100 p-2 rounded-full">
<img src="assets/Aperture.png" alt="">
</div>

<div>

<h2 class="font-semibold text-lg">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-6 text-sm">

<span class="text-green-600">
● Open
</span>

<span class="text-purple-600">
● Closed
</span>

</div>

</div>

</div>



<!-- LOADING -->

<div id="loading" class="text-center hidden mb-6">

<span class="loading loading-spinner loading-lg"></span>

</div>



<!-- ISSUES GRID -->

<div id="issueContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

</div>

</div>



<!-- MODAL -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-semibold text-lg"></h3>

<p id="modalDesc" class="py-3 text-sm"></p>

<div class="text-sm space-y-1">

<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Created:</b> <span id="modalDate"></span></p>

</div>

<div class="modal-action">

<form method="dialog">
<button class="btn btn-primary square">
Close
</button>
</form>

</div>

</div>

</dialog>



<script>

let api="https://phi-lab-server.vercel.app/api/v1/lab/issues"

let container=document.getElementById("issueContainer")
let loading=document.getElementById("loading")



async function loadAll(){

setActive("allTab")

loading.classList.remove("hidden")

let res=await fetch(api)
let data=await res.json()

showIssues(data.data)

loading.classList.add("hidden")

}



async function loadOpen(){

setActive("openTab")

loading.classList.remove("hidden")

let res=await fetch(api)
let data=await res.json()

let open=data.data.filter(i=>i.status==="open")

showIssues(open)

loading.classList.add("hidden")

}



async function loadClosed(){

setActive("closedTab")

loading.classList.remove("hidden")

let res=await fetch(api)
let data=await res.json()

let closed=data.data.filter(i=>i.status==="closed")

showIssues(closed)

loading.classList.add("hidden")

}



function showIssues(issues){

container.innerHTML=""

document.getElementById("issueCount").innerText=issues.length

issues.forEach(issue=>{

let border = issue.status==="open"
? "border-green-500"
: "border-purple-500"

let priorityColor="bg-gray-200"

if(issue.priority==="high") priorityColor="bg-red-400 text-white"
if(issue.priority==="medium") priorityColor="bg-yellow-400"
if(issue.priority==="low") priorityColor="bg-gray-300"


let labelsHTML=""

if(issue.labels){
issue.labels.forEach(l=>{
labelsHTML+=`<span class="badge badge-outline text-xs">${l}</span>`
})
}


let card=`

<div onclick="openModal(${issue.id})"
class="bg-white border-t-4 ${border} shadow p-4 cursor-pointer">

<div class="flex justify-between mb-2">

<span class="text-green-500">●</span>

<span class="text-xs px-2 py-1 ${priorityColor}">
${issue.priority?.toUpperCase()}
</span>

</div>

<h3 class="font-medium text-sm mb-1">
${issue.title}
</h3>

<p class="text-xs text-gray-500 mb-3">
${issue.description.slice(0,80)}...
</p>

<div class="flex gap-2 mb-3">
${labelsHTML}
</div>

<p class="text-xs text-gray-500">
#${issue.id} by ${issue.author}
</p>

<p class="text-xs text-gray-400">
${issue.createdAt}
</p>

</div>

`

container.innerHTML+=card

})

}



async function openModal(id){

let res=await fetch("https://phi-lab-server.vercel.app/api/v1/lab/issue/"+id)

let data=await res.json()

let issue=data.data

document.getElementById("modalTitle").innerText=issue.title
document.getElementById("modalDesc").innerText=issue.description
document.getElementById("modalAuthor").innerText=issue.author
document.getElementById("modalStatus").innerText=issue.status
document.getElementById("modalPriority").innerText=issue.priority
document.getElementById("modalDate").innerText=issue.createdAt

document.getElementById("issueModal").showModal()

}



async function searchIssues(){

let text=document.getElementById("searchInput").value

let res=await fetch("https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q="+text)

let data=await res.json()

showIssues(data.data)

}



function setActive(tab){

document.getElementById("allTab").classList.remove("btn-primary")
document.getElementById("openTab").classList.remove("btn-primary")
document.getElementById("closedTab").classList.remove("btn-primary")

document.getElementById(tab).classList.add("btn-primary")

}



loadAll()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="card w-96 bg-white shadow-xl p-6">

  <div class="text-center mb-4">
    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-12 mx-auto mb-2">
    <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
    <p class="text-sm text-gray-500">Sign in to manage your issues</p>
  </div>

  <div class="space-y-3">

    <div>
      <label class="text-sm">Username</label>
      <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full">
      <p class="text-xs text-blue-500">Default: admin</p>
    </div>

    <div>
      <label class="text-sm">Password</label>
      <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full">
      <p class="text-xs text-blue-500">Default: admin123</p>
    </div>

    <button onclick="login()" class="btn btn-primary w-full">
      Sign In
    </button>

    <div class="text-center text-gray-400 text-sm">OR</div>

    <div class="bg-gray-100 p-3 text-sm rounded">
      <p>Demo Credentials:</p>
      <p>Username: admin</p>
      <p>Password: admin123</p>
    </div>

  </div>

</div>

<script src="login.js"></script>

</body>
</html>
